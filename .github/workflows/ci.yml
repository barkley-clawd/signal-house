name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Nuxt
        run: npm exec nuxi prepare

      - name: Run tests
        run: npm test

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build
